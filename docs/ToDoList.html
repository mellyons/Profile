<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
   <link rel="stylesheet" href="ToDoStyles.css">
</head>

<body>
    <ul class="todo-list">
        <li>
            <input type="checkbox" id="dog" name="dog">
            <label for="dog">Walk the Dog</label>
                <ul class="sub-item">
                    <li><a class="sub-item-link" href="https://discoverymood.com/blog/walk-dog-good-mental-health/"target="_blank">Mental Health</a>
                    </li>
                </ul>   
        </li>

        <li>
            <input type="checkbox" id="meeting" name="meeting">
            <label for="meeting">Meeting at 10 am</label>
                <ul class="sub-item">
                    <li><a class="sub-item-link" href="https://support.microsoft.com/en-us/teams/meetings-events/meetings-in-microsoft-teams" target="_blank">Meetings</a>
                    </li>
                </ul>    
        </li>

        <li>
            <input type="checkbox" id="lunch" name="lunch">
            <label for="lunch">Lunch with Friends at 1pm</label>  
                <ul class="sub-item">
                    <li><a class="sub-item-link" href="https://www.tripadvisor.com/Restaurants-g55197-zfp30-Memphis_Tennessee.html" target="_blank">Friends</a>
                    </li>
                </ul>
        </li>

        <li>
            <input type="checkbox" id="report" name="report">
            <label for="report">Finance Report due by EOB</label>
                <ul class="sub-item">
                    <li><a class="sub-item-link" href="https://www.microsoft.com/en-gb/microsoft-365/excel" target="_blank">Reporting</a>
                    </li>
                </ul>
        </li>
    </ul>
</body>

</html>
